</svg>

<div class="absolute inset-0 border-[0.5px] border-primary-container/20 rounded-full scale-125"></div>
</div>

<span class="h-[1px] w-8 bg-primary-container/40"></span>

<div class="absolute -top-24 -right-24 w-96 h-96 bg-secondary/5 blur-[120px] rounded-full"></div>
