<div class="space-y-4">

<div class="relative">

<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface/20 group-focus-within:text-secondary transition-colors">mail</span>
</div>
</div>
</div>
